<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactanos</title>
    <link rel="stylesheet" href="../Assets/css/contacto.css">
    <link rel="stylesheet" href="../Assets/css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

    <main role="main">
        <div class="titulo">
            <h1>Contactanos</h1>
            <p>Si tienes alguna pregunta o necesitas más información, no dudes en contactarnos.</p>
        </div>

        <input type="checkbox" id="cerrar-modal" style="display:none">

        <form class="formulario" action="#" method="post" aria-label="Formulario de contacto">
            <input  id="correo" type="email" placeholder="Correo electronico" required aria-label="Correo electronico">
            <input id="asunto" type="text" placeholder="Asunto" required aria-label="Asunto">
            <textarea id="mensajeTexto" placeholder="Escribe tu mensaje aquí" required aria-label="Mensaje"></textarea>
            <p id="mensajeCorreo" class="mensaje" role="alert"></p>
            <p id="mensajeAsunto" class="mensaje" role="alert"></p>
            <p id="mensajeMensaje" class="mensaje" role="alert"></p>

            <button id="enviar" type="submit">Enviar</button>
            <div class="spinner" aria-label="Cargando"></div>
            
        </form>

        <div class="modal" role="dialog" aria-label="Confirmación de envío">
            <div class="modal-contenido">
                <h2>¡Mensaje enviado!</h2>
                <p>Nos pondremos en contacto contigo pronto.</p>
                <label for="cerrar-modal" aria-label="Cerrar modal">Cerrar</label>
            </div>
        </div>
   <script>
    // 🔹 Validación en tiempo real - CORREO
    $('#correo').on('input', function() {
        let email = $(this).val();

        if (email.includes('@') && email.includes('.')) {
            $(this).removeClass('error').addClass('valid');
            $('#mensajeCorreo').text('');
        } else {
            $(this).removeClass('valid').addClass('error');
            $('#mensajeCorreo').text('Correo no válido');
        }
    });

    // 🔹 Validación en tiempo real - ASUNTO
    $('#asunto').on('input', function() {
        let asunto = $(this).val();

        if (asunto.trim().length > 0) {
            $(this).removeClass('error').addClass('valid');
            $('#mensajeAsunto').text('');
        } else {
            $(this).removeClass('valid').addClass('error');
            $('#mensajeAsunto').text('Asunto inválido');
        }
    });
/* validacion de texto */
        $('#mensajeTexto').on('input', function() {
            let mensaje = $(this).val();
    
            if (mensaje.trim().length > 0) {
                $(this).removeClass('error').addClass('valid');
                $('#mensajeMensaje').text('');
            } else {
                $(this).removeClass('valid').addClass('error');
                $('#mensajeMensaje').text('Mensaje inválido');
            }
        });

    // 🔹 Envío del formulario
    $('.formulario').submit(function(e) {
        e.preventDefault();

        // Obtener valores
        let mensaje = $('textarea').val();
        let email = $('#correo').val();
        let asunto = $('#asunto').val();

        // Validaciones
        let correoValido = email.includes('@') && email.includes('.');
        let asuntoValido = asunto.trim().length > 0;
        let mensajeValido = mensaje.trim().length > 0;

        // Si algo está mal, NO continúa
        if (!correoValido || !asuntoValido || !mensajeValido) {
            return;
        }

        // Mostrar spinner
        $('.spinner').show();

        // Simular envío
        setTimeout(function() {
            $('.spinner').hide();
          
            $('#cerrar-modal').prop('checked', true);
        }, 2000);
    });
</script>
        <button onclick="toggleDarkMode()" aria-label="Activar modo oscuro">Modo oscuro</button>
    </main>

    <footer role="contentinfo">
        <ul>
            <li><a class="boton-inicio" href="../index.html" aria-label="Volver al inicio">Inicio</a></li>
            <li><a href="https://maps.app.goo.gl/j1ZGdCBHEbtTEC1y9" aria-label="Ver ubicación en el mapa">Donde ubicarnos</a></li>
            
        </ul>
    </footer>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle("dark");
        }
    </script>

</body>
</html>
